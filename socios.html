<!DOCTYPE html>
<html lang="es">

<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d6efd">

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ACDP - Portal Afiliados</title>

<link rel="stylesheet" href="./styles/socios.css">

</head>

<body>

<header class="socios-header">

<img
src="./iconos/icono-app.png"
alt="ACDP">

<h2>
Portal de Afiliados ACDP
</h2>

</header>

<!-- ===============================
     BOTÓN FLOTANTE
================================ -->

<div id="menuOpciones"
class="menuOpciones oculto">

<button id="btnOpciones"
class="btnOpciones">

OPCIONES

</button>

<div id="panelOpciones"
class="panelOpciones oculto">

<button data-seccion="perfil">

Perfil

</button>

<button data-seccion="cuenta">

Cuenta

</button>

<button data-seccion="cursos">

Cursos

</button>

<button data-seccion="novedades">

Novedades

</button>

<button id="btnCerrarSesion">

Cerrar sesión

</button>

</div>

</div>

<main class="socios-main">

<!-- ===============================
     LOGIN
================================ -->

<section
id="loginSocio"
class="tarjeta">

<h2>

Ingreso de afiliado

</h2>

<p>

DNI

</p>

<input

id="loginNumero"

class="inputNumero"

maxlength="8"

inputmode="numeric"

placeholder="Ingrese su DNI"

>

<input

id="loginPin"

type="password"

maxlength="4"

inputmode="numeric"

placeholder="PIN"

>

<button id="btnLoginSocio">

Ingresar

</button>

<p id="mensajeLogin"></p>

<br>

<button id="btnInstalarApp">

📲 Bajar Aplicación

</button>

</section>

<!-- ===============================
     PERFIL
================================ -->

<section
id="seccionPerfil"
class="tarjeta oculto">

<h2>

Mi Perfil

</h2>

<div class="datosSocio">

<div>

<label>DNI</label>

<span id="datoDni"></span>

</div>

<div>

<label>Nombre</label>

<span id="datoNombre"></span>

</div>

<div>

<label>Apellido</label>

<span id="datoApellido"></span>

</div>

<div>

<label>Celular</label>

<span id="datoCelular"></span>

</div>

<div>

<label>Correo</label>

<span id="datoCorreo"></span>

</div>

<div>

<label>Estado</label>

<span id="datoEstado"></span>

</div>

<div>

<label>Fecha de Alta</label>

<span id="datoFechaAlta"></span>

</div>

</div>

<div
id="contenedorCuotas"
class="oculto">

<h3>

Estado de Cuotas

</h3>

<div id="cuotasSocio">

</div>

</div>

<div class="cuotaActual">

Cuota actual:

<strong id="valorCuota">

$0

</strong>

</div>

<div class="accionesSocio">

<a
href="https://whatsapp.com/channel/0029Vb7zDMa4dTnBFXJcKf3x"
target="_blank"
rel="noopener noreferrer"
>

<button>

📢 Ver Canal ACDP

</button>

</a>

</div>

</section>

<!-- ===============================
     CUENTA
================================ -->

<section
id="seccionCuenta"
class="tarjeta oculto">

<h2>

Mi Cuenta

</h2>

<div class="form-edicion">

<input

id="nuevoPin"

type="password"

maxlength="4"

inputmode="numeric"

placeholder="Nuevo PIN"

>

<input

id="nuevoCorreo"

maxlength="50"

placeholder="Correo electrónico"

>

<input

id="nuevoCelular"

maxlength="10"

inputmode="numeric"

placeholder="Celular"

>

<button id="btnGuardarCuenta">

Guardar Cambios

</button>

</div>

</section>

<!-- ===============================
     CURSOS
================================ -->

<section
id="seccionCursos"
class="tarjeta oculto">

<h2>

Cursos Disponibles

</h2>

<div id="listaCursosSocio">

</div>

</section>

<!-- ===============================
     NOVEDADES
================================ -->

<section
id="seccionNovedades"
class="tarjeta oculto">

<h2>

Novedades

</h2>

<div id="listaNovedades">

</div>

</section>

</main>

<script
type="module"
src="instalar-app.js"></script>

<script
type="module"
src="socios.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("./sw.js");

}

</script>

</body>

</html>

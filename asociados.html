<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACDP - Consulta de Asociados</title>

<link rel="stylesheet" href="styles.css">

</head>


<body>


<header class="header">

    <img 
    src="logo.jpg" 
    alt="ACDP"
    width="100"
    height="100"
    >

    <p>
    Sistema de Gestión de Afiliados
    </p>

</header>



<main id="consultaAsociado">



<section class="seccion activa">



<h2>

CONSULTA DE ASOCIADO

</h2>


<br>


<p>

Ingresá tu DNI o Número de Afiliado para consultar tu situación.

</p>



<br>




<div class="bloque">


<input

id="buscadorAsociado"

class="inputNumero"

maxlength="8"

minlength="8"

inputmode="numeric"

placeholder="DNI o Nro Afiliado"


>


</div>





<div id="resultadoAsociado">



<div class="tarjetaConsulta">


<h3>

Esperando búsqueda...

</h3>


<p>

Ingresá tu número para consultar información.

</p>


</div>



</div>





</section>



</main>





<script src="bd.js"></script>

<script src="config.js"></script>

<script src="asociados.js"></script>



</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACDP - Portal Asociados</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="asociados.css">

</head>

<body>

<header class="header asociados-header">

    <img
        src="logo.jpg"
        alt="ACDP"
        width="100"
        height="100"
    >

    <p>
        Portal de Asociados ACDP
    </p>

</header>

<main class="asociados-main">

    <!-- ========================= -->
    <!-- LOGIN -->
    <!-- ========================= -->
    <section id="loginAsociado" class="asociados-card">

        <h2>Acceso de asociado</h2>

        <p>Ingrese su número de afiliado y PIN personal.</p>

        <div class="asociados-form">

            <input
                id="numeroAsociado"
                class="inputNumero"
                maxlength="8"
                minlength="8"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="Número de afiliado"
                autocomplete="off"
            >

            <input
                id="pinAsociado"
                type="password"
                maxlength="8"
                inputmode="numeric"
                pattern="[0-9]*"
                placeholder="PIN"
                autocomplete="off"
            >

            <button id="btnIngresarAsociado">
                Ingresar
            </button>

        </div>

        <p id="mensajeAsociado" class="mensajeAsociado"></p>

    </section>

    <!-- ========================= -->
    <!-- PERFIL -->
    <!-- ========================= -->
    <section id="perfilAsociado" class="asociados-card oculto">

        <h2>Mi perfil</h2>

        <div class="datosAsociado">

            <div><label>Número afiliado</label><span id="datoNumero"></span></div>
            <div><label>DNI</label><span id="datoDni"></span></div>
            <div><label>Nombre</label><span id="datoNombre"></span></div>
            <div><label>Apellido</label><span id="datoApellido"></span></div>
            <div><label>Celular</label><span id="datoCelular"></span></div>
            <div><label>Correo</label><span id="datoCorreo"></span></div>
            <div><label>Fecha de alta</label><span id="datoFecha"></span></div>
            <div><label>Estado</label><span id="datoEstado"></span></div>

        </div>

        <h3>Editar datos personales</h3>

        <div class="edicionAsociado">

            <input
                id="editarCelular"
                maxlength="10"
                inputmode="numeric"
                placeholder="Nuevo celular"
            >

            <input
                id="editarCorreo"
                maxlength="30"
                placeholder="Nuevo correo"
            >

            <button id="btnGuardarDatos">
                Guardar cambios
            </button>

        </div>

        <h3>Cambiar PIN</h3>

        <div class="edicionAsociado">

            <input
                id="nuevoPin"
                type="password"
                maxlength="8"
                inputmode="numeric"
                placeholder="Nuevo PIN"
            >

            <input
                id="confirmarPin"
                type="password"
                maxlength="8"
                inputmode="numeric"
                placeholder="Confirmar PIN"
            >

            <button id="btnCambiarPin">
                Cambiar PIN
            </button>

        </div>

        <h3>Estado de cuotas</h3>

        <div id="cuotasAsociado"></div>

        <div class="cuotaActual">
            Cuota actual:
            <strong id="datoCuota">$0</strong>
        </div>

        <button id="btnCerrarSesionAsociado">
            Cerrar sesión
        </button>

    </section>

</main>

<!-- ========================= -->
<!-- SCRIPTS (ORDEN CORRECTO FIRESTORE) -->
<!-- ========================= -->

<!-- 1. Firebase (OBLIGATORIO PRIMERO) -->
<script type="module" src="firebase-config.js"></script>
<script type="module" src="puenteFirebase.js"></script>

<!-- 2. Lógica de configuración -->
<script src="config.js"></script>

<!-- 3. Lógica del portal -->
<script src="asociados.js"></script>

</body>

</html>
